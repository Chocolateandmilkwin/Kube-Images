name: Publish ComfyUI image

on:
  push:
    branches:
      - main
    paths:
      - "comfy-ui/**"
      - ".github/workflows/publish-comfy-ui.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: ./comfy-ui
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/comfy-ui:latest
            ghcr.io/${{ github.repository_owner }}/comfy-ui:sha-${{ github.sha }}