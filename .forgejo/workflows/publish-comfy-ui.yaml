name: Publish ComfyUI image

on:
  push:
    branches:
      - main
    paths:
      - "comfy-ui/**"
      - ".forgejo/workflows/publish-comfy-ui.yaml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: docker
    env:
      DOCKER_HOST: tcp://host.docker.internal:2375
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          apt-get update
          apt-get install --yes --no-install-recommends docker.io

      - name: Log in to the Forgejo container registry
        run: |
          printf '%s' '${{ secrets.REGISTRY_TOKEN }}' | docker login forgejo.nsns.dk \
            --username '${{ secrets.REGISTRY_USERNAME }}' \
            --password-stdin

      - name: Build and publish
        run: |
          image=forgejo.nsns.dk/chocolateandmilkwin/comfy-ui
          docker build --tag "${image}:latest" \
            --tag "${image}:sha-${{ forgejo.sha }}" ./comfy-ui
          docker push "${image}:latest"
          docker push "${image}:sha-${{ forgejo.sha }}"
