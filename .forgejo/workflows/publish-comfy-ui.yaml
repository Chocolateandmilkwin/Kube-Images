name: Publish ComfyUI image

on:
  push:
    branches:
      - main
    paths:
      - "comfy-ui/**"
      - ".forgejo/workflows/publish-comfy-ui.yaml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Forgejo container registry
        run: |
          printf '%s' '${{ secrets.REGISTRY_TOKEN }}' | podman login forgejo.nsns.dk \
            --username '${{ secrets.REGISTRY_USERNAME }}' \
            --password-stdin

      - name: Build and publish
        run: |
          image=forgejo.nsns.dk/chocolateandmilkwin/comfy-ui
          podman build \
            --tag "${image}:latest" \
            --tag "${image}:sha-${{ forgejo.sha }}" \
            ./comfy-ui
          podman push "${image}:latest"
          podman push "${image}:sha-${{ forgejo.sha }}"
